<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 在线剪切板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh; color: #e2e8f0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px 20px;
        }
        .top-bar { margin-bottom: 30px; text-align: center; }
        .top-bar a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; }
        .top-bar a:hover { color: #e2e8f0; }
        .top-bar h1 { font-size: 1.5rem; color: #f1f5f9; margin-top: 8px; }

        .card {
            background: #1e293b; border: 1px solid #334155; border-radius: 16px;
            padding: 36px 32px; max-width: 420px; width: 100%; text-align: center;
        }
        .card .icon { font-size: 3.5rem; margin-bottom: 12px; }
        .card h2 { color: #f1f5f9; font-size: 1.2rem; margin-bottom: 6px; }
        .card .hint { color: #64748b; font-size: 0.85rem; margin-bottom: 28px; line-height: 1.6; }

        .form-group { margin-bottom: 14px; text-align: left; }
        .form-group label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 6px; font-weight: 500; }
        .form-group input {
            width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 8px;
            color: #e2e8f0; padding: 12px 16px; font-size: 0.95rem; outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: #6366f1; }

        .btn {
            border: none; border-radius: 8px; padding: 12px 24px; font-size: 1rem;
            cursor: pointer; transition: all 0.2s; font-weight: 500;
        }
        .btn-primary { background: #6366f1; color: #fff; width: 100%; }
        .btn-primary:hover { background: #4f46e5; }

        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #10b981; color: #fff; padding: 10px 24px; border-radius: 8px;
            font-size: 0.9rem; z-index: 999; opacity: 0; transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        .toast.error { background: #ef4444; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="/">← 返回首页</a>
        <h1>📋 在线剪切板</h1>
    </div>

    <div class="card">
        <div class="icon">📋</div>
        <h2>进入你的工作区</h2>
        <p class="hint">文本和文件都会归入同一个工作区<br>一个链接即可分享全部内容</p>
        <div class="form-group">
            <label>👤 用户名</label>
            <input type="text" id="loginUsername" placeholder="2-30位字母/数字/-/_" maxlength="30" autofocus>
        </div>
        <div class="form-group">
            <label>🔒 访问密码 <span style="color:#64748b;font-weight:400">（可选，设密码后他人需凭密码访问和编辑）</span></label>
            <input type="password" id="loginPassword" placeholder="留空则公开访问">
        </div>
        <button class="btn btn-primary" onclick="doLogin()">🚀 进入工作区</button>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        function showToast(msg, isErr) { var t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast' + (isErr ? ' error' : '') + ' show'; setTimeout(function(){ t.classList.remove('show'); }, 2200); }

        async function doLogin() {
            var username = document.getElementById('loginUsername').value.trim();
            if (!username) { showToast('请输入用户名', true); return; }
            if (username.length < 2) { showToast('用户名至少2个字符', true); return; }
            var password = document.getElementById('loginPassword').value.trim();

            try {
                var res = await fetch('/api/user', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password })
                });
                var data = await res.json();
                if (!res.ok) { showToast(data.error, true); return; }

                // 记住登录
                localStorage.setItem('ws_user', JSON.stringify({username: data.user.username, password: password}));
                window.location.href = '/u/' + data.user.username;
            } catch (e) { showToast('网络错误', true); }
        }

        // 自动跳转
        (function() {
            var saved = localStorage.getItem('ws_user');
            if (!saved) return;
            try {
                var user = JSON.parse(saved);
                fetch('/api/user', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user.username, password: user.password || '' })
                }).then(function(r){ return r.json(); }).then(function(d){
                    if (!d.error) window.location.href = '/u/' + d.user.username;
                }).catch(function(){});
            } catch(e) {}
        })();

        document.getElementById('loginUsername').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
        document.getElementById('loginPassword').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
    </script>
</body>
</html>
